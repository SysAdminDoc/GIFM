name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Server smoke test
        run: node scripts/smoke.mjs

      - name: UI smoke test
        run: node scripts/ui-smoke.mjs

      - name: Package portable
        run: npm run package:portable

      - name: Package smoke test
        run: npm run package:smoke

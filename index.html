<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="GIFM v0.5.2 converts local videos and existing GIFs into Discord-ready animated GIFs."
    />
    <meta name="theme-color" content="#0b0f14" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>GIFM v0.5.2</title>
    <script>
      // Apply the stored (or OS-preferred) theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem('gifm:theme:v1'));
          var theme = stored === 'light' || stored === 'high-contrast' || stored === 'dark'
            ? stored
            : 'dark';
          document.documentElement.dataset.theme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
